<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>회원가입</legend>
            <table>
                <tr>
                    <td><label for="userId">사용자 ID</label></td>
                    <td><input type="text" id="userId" name="userId"></td>
                </tr>
                <tr>
                    <td><label for="password">비밀번호</label></td>
                    <td><input type="password" id="password" name="password"></td>
                </tr>
                <tr>
                    <td><label for="password">비밀번호 확인</label></td>
                    <td><input type="password" id="password" name="password"></td>
                </tr>
                <tr>
                    <td><label for="username">이름</label></td>
                    <td><input type="text" id="username" name="username"></td>
                </tr>
                <tr>
                    <td>성별</td>
                    <td>
                        <input type="radio" id="man" name="gender" value="m">
                        <label for="man">남자</label>
                        <input type="radio" id="woman" name="gender" value="w">
                        <label for="woman">여자</label>
                    </td>
                </tr>
                <tr>
                    <td>취미</td>
                    <td>
                        <input type="checkbox" id="soccer" value="soccer" name="hobby">
                        <label for="soccer">축구</label>
                        <input type="checkbox" id="baseball" value="baseball" name="hobby">
                        <label for="baseball">야구</label>
                        <input type="checkbox" id="volleyball" value="volleyball" name="hobby">
                        <label for="volleyball">배구</label>
                        <input type="checkbox" id="basketball" value="basketball" name="hobby">
                        <label for="basketball">농구</label>
                </td>
                </tr>
                <tr>
                    <td><label for="email">email</label></td>
                    <td><input type="email" id="email" name="email"></td>
                </tr>
                <tr>
                    <td><label for="role">역할</label></td>
                    <td>
                        <select id="role">
                            <optgroup label="ADMIN">
                                <option>관리자</option>
                                <option>일반회원</option>
                            </optgroup>
                        </select>
                    </td>
                </tr>
            </table>
            <input type="submit" value="확인">
            <input type="reset" value="다시쓰기">
        </fieldset>
    </form>
</body>
</html>
