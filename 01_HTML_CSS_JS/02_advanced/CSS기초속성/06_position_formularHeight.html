<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        position: absolute;
        margin: 0;
      }

      body > div {
        position:relative;
        float: left;
        width: 500px;
        height: 100px;
        border: 3px solid black;
      }

      .box:nth-child(1) {
        position: absolute;
        left: 5px;
        top: 5px;
        width: 100px;
        height: 100px;
        background-color: red;
      }

      .box:nth-child(2) {
        position: absolute;
        left: 35px;
        top: 35px;
        width: 100px;
        height: 100px;
        background-color: green;
      }

      .box:nth-child(3) {
        position: absolute;
        left: 70px;
        top: 70px;
        width: 100px;
        height: 100px;
        background-color: blue;
      }
    </style>
  </head>
  <body>
    <h1>Lorem ipsum dolor amet</h1>
    <div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>
    <h1>Lorem ipsum dolor amet</h1>
  </body>
</html>
