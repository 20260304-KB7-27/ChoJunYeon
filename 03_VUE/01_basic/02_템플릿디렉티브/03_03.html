<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <!-- v-bind: 속성명="데이터" -->
      <input type="text" v-bind:value="message">
      <!-- :속성명="데이터" -->
       <img :src="imagePath">
       <h1 v-bind="{ class:h1Class, style: h1Style }">{{h1Text}}</h1>
    </div>

    <script>
      // 근데 ref가 뭐지 아래는 어떤걸 의미하는걸까???????
      const { createApp, ref } = Vue;
/*
v-bind 디렉티브
- HTML 요소의 속성과 Vue의 데이터를 연결해주는 디렉티브
*/

      createApp({
        setup() {
          // 반응형 변수
          const message = ref("v-bind 디렉티브");
          const imagePath = ref('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTaEk627a2azKRHnaC02bJVyolqkY5hqaZTiXMql58CiyTY3Pm6UGUNNqVTKj9Y2GSXKR31G6fMGwAtIa_2X7-B5GdgwGMzYKyIFGfezVET&s=10');

          const h1Text = ref("v-bind 디렉티브");
          const h1class = ref("title-text");
          const h1Style = ref({
            color: "blue",
            fotntWeiht: "bold",
            textDecoration: "underline",
          });

          return {
            h1Text,
            h1Style,
            h1class,
            message,
            imagePath,
          };
        },
      }).mount('#app');
    </script>
    
  </body>
</html>
