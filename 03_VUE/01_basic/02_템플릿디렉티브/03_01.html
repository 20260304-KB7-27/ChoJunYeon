<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="app">
      <h2 v-text="message"></h2>
      <h2>{{message}}</h2>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
      // 1. Vue 어플리케이션 인스턴스를 생성
      // 2. 생성된 반응형 데이터를 템플릿에 바인딩
      // 가상돔
      // 1. mount 함수를 통해 앱을 마운트 -> 가상DOM 생성
      // 2. Vue가 실제 DOM에 가상 DOM 반영 -> 실제 DOM 생성
      // 3. 반응형 데이터(message)가 변경되면 Vue가 변경을 감지 -> 새로운 가상DOM 생성
      // 4. Vue의 Diffing 알고리즘으로 생성된 새로 생성된 가상DOM과 기존 DOM을 비교 -> 변경된 부분만 실제 DOM에 반영
      // 5. 변경된 부분만 실제 DOM에 반영 (랜더링)
      var { createApp } = Vue;

      var model = { message: 'Hello Vue3!' };
      const message = "Hello Vue3!"

      createApp({
        
        // 반응형 데이터를 정의하는곳
        data() {
          return model;
        },
      }).mount('#app');
    </script>
    
  </body>
</html>
