<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      금액: <input type="text" v-model.number="amount"><br>
      <button @click="inputMoney">입금</button>
      <button @click="outputMoney">출금</button>
      <br>
      <h2>계좌 잔고: {{balance}}</h2>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
            const amount = ref(0);
            const balance = ref(0);
            const inputMoney = () => {
                balance.value += parseInt(amount.value);
            }
            const outputMoney = () => {
                balance.value -= parseInt(amount.value);
            }
          return {
            amount,
            balance,
            inputMoney,
            outputMoney,
          };
        },
      }).mount('#app');
    </script>
    
  </body>
</html>
