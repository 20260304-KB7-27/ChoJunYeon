<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
        1보다 큰 수 : <input type="text" v-model.number="num">
        <br>
        1부터 입력한 수까지의 합: <span>{{sum()}}</span><br>
        1부터 입력한 수까지의 합: <span>{{sum()}}</span><br>
        1부터 입력한 수까지의 합: <span>{{sum()}}</span><br>
      
    </div>

    <script>
      const { createApp, ref, computed, onMounted, onUpdated } = Vue;
    
      createApp({
        setup() {
            const num = ref(0);
            const sum = () => {
                return num.value * (num.value+1)/2;
            };
            
            console.log("created");

            onMounted(() => {
                console.log("mounted");
            });

            onUpdated(() => {
                console.log("updated");
            });

          return {
            num,
            sum,
            onMounted,
            onUpdated,
          };
        },
      }).mount('#app');
    </script>
    
  </body>
</html>
