<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
      .buttonColor {
        background-color: aqua;
        color: black;
      }
      .buttonLayOut {
        justify-content: center;
        width: 120px;
      }
      .staticBorder {
        border: khaki dashed 1px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <button class="staticBorder" :class="{buttonColor:myColor.btnColor, buttonLayOut:myColor.btnLayOut}">테스트</button>
      
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const myColor = ref({
            btnColor: true,
            btnLayOut: true,
          }

          )
          return {
            myColor,
          };
        },
      }).mount('#app');
    </script>
    
  </body>
</html>
