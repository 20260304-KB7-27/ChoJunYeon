<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
      .warning {
        background-color: aqua;
        color: purple;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div>
        <p>1부터 100까지만 입력 가능합니다.</p>
        <p>점수: <input type="text" :value="score" @input="handleInput" :class="info"></p>
      </div>
    </div>

    <script>
      const { createApp, ref, computed } = Vue;

      createApp({
        setup() {
          const score = ref(0);
          const handleInput = (e) => {
            const val = parseInt(e.target.value);
            score.value = isNaN(val) ? 0 : val;
          }

          const info = computed(() => {
            return {warning : score.value < 1 || score.value > 100};
          })


          return {
            score,
            handleInput,
            info,
          };
        },
      }).mount('#app');
    </script>
    
  </body>
</html>
