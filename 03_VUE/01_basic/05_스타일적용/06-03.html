<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <div @mouseover="parentOverEvent"  @mouseout="parentOutEvent">
        <button :style="{backgroundColor, color}" @mouseover.stop="overEvent" @mouseout="outEvent">테스트</button>
      </div>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {

            const backgroundColor = ref('aqua');
            const color = ref('black');

            const parentOverEvent = () => {
                console.log('parent Over Event');
            }

            const parentOutEvent = () => {
                console.log('parent Out Event');
            }
            const overEvent = () => {
                // 스타일 변경
                backgroundColor.value = "purple";
                color.value = 'yellow';
            }
            const outEvent = (e) => {
                backgroundColor.value = "aqua";
                color.value = 'black';

                e.stopPropagation(); //이벤트 전파 막기
                
            }
          return {
            backgroundColor,
            color,
            overEvent,
            outEvent,
            parentOutEvent,
            parentOverEvent,
          };
        },
      }).mount('#app');
    </script>
    
  </body>
</html>
